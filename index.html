<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Mindmap</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #020810;
      font-family: 'Orbitron', system-ui, sans-serif;
      color: #00e5ff;
    }
    canvas { display: block; }

    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      background: rgba(0, 229, 255, 0.06);
      border: 1px solid rgba(0, 229, 255, 0.3);
      color: #00e5ff;
      padding: 10px 18px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-family: 'Orbitron', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
      backdrop-filter: blur(10px);
      transition: all 0.2s;
    }
    button:hover {
      background: rgba(0, 229, 255, 0.15);
      border-color: rgba(0, 229, 255, 0.6);
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
    }

    #tooltip {
      position: fixed;
      background: rgba(2, 8, 16, 0.9);
      color: #00e5ff;
      padding: 8px 14px;
      border-radius: 2px;
      font-size: 11px;
      font-family: 'Orbitron', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
      pointer-events: none;
      display: none;
      border: 1px solid rgba(0, 229, 255, 0.4);
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.1);
    }

    #help {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: rgba(0, 229, 255, 0.3);
      font-size: 9px;
      font-family: 'Orbitron', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
      z-index: 10;
    }

    #hud-top {
      position: fixed;
      top: 20px;
      right: 20px;
      text-align: right;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.4;
      z-index: 10;
    }
    #hud-top span { display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div id="ui">
    <button id="btn-add">+ Tilfoej node</button>
    <button id="btn-add-root">+ Ny kerne-ide</button>
    <button id="btn-reset">Nulstil visning</button>
  </div>
  <div id="tooltip"></div>
  <div id="hud-top">
    <span>Mindmap v1.0</span>
    <span>System online</span>
  </div>
  <div id="help">Klik: vaelg &middot; Dobbeltklik: tilfoej &middot; Traek: roter &middot; Scroll: zoom</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module" src="app.js"></script>
</body>
</html>
